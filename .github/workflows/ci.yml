name: Django CI

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    - name: Run Linter (flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Check Formatting (black & isort)
      run: |
        black --check .
        isort --check-only --profile black .

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit semgrep
    - name: Security Scan (bandit)
      run: bandit -r . -x ./venv,./.venv
    - name: Static Analysis (Semgrep)
      run: semgrep --config auto .

  safety:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Ensure requirements.txt is UTF-8
      run: |
        if [ -f requirements.txt ]; then
          python3 -c "content = open('requirements.txt', 'rb').read(); open('requirements.txt', 'wb').write(content.decode('utf-16' if content.startswith((b'\xff\xfe', b'\xfe\xff')) else 'utf-8-sig').encode('utf-8'))"
        fi
    - name: Security Scan (safety)
      uses: pyupio/safety-action@v1
      with:
        api-key: ${{ secrets.SAFETY_API_KEY }}

  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Secret Scanning (Gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Vulnerability Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

  django:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Django System Check
      run: |
        python manage.py check
        python manage.py check --deploy
    - name: Run Tests
      run: |
        python manage.py test --noinput --parallel
